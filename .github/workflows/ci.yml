name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Build C++ engine
        working-directory: core_engine
        run: cmake . && make

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        run: pytest backend/tests/
